body:
  text: 住芙蓉山嗣法小師道楷編上堂示徒曰正正時非圓圓中還有遍遍遍時不色色裡却存圓更深催曉氣日闌洞曉天兩墀和融處貴所得玄玄汝等諸人到這裡如何安身立命得恁麼相應去良久曰夜明簾外主今古無人知須是傍參手樹宗乘一枝山僧此四句諸禪德又作麼生商量時有僧出衆問承和尚有言圓中還有遍色裡却存圓斯理如何師云正不立玄偏不附物僧云可謂暗中有明明中有暗師云汝道是何道理僧云共難其諱師曰是須恁麼會僧乃禮拜師乃云泉洗檻前月天橫雨外山夜來少室睡佛祖大難大難便下座上堂因示徒云妙道通心離語言玄途溫體不清痕龍巢鳳子豈常種了了一機誰得論諸禪德且道這箇是滿眼滿耳底樣子正與麼時還知落處雲巒崇聳青山頂喬嶽東邊萬象靜天上人間一樣春誰迎景色到江上卓拄杖一下云直饒十成去猶是爭半提時有僧出衆問如何是全提時節師云釋迦老子建立化城僧云權化消息為孰說師云寶所在近更進一步僧云已是寶處豈得去乎師云是須與麼去僧云出他屋裡作什麼活計師云雖無活計甚勝富貴僧云如何是密處活計師云劫外儼然無物惱師僧云容顏甚奇妙乃作禮師乃云鷲嶺笑昌香色芬芳列聖叢裡獨沒商量乃下座上堂因示徒云一處妙時萬處空三世了時千世同寂寂寥寥得後事颯颯凄凄風樹松這箇無人著道理那箇有深見異中體處用時無別處一段活心得妙通拈拄杖云看看此是田地隱密底人此是神通遊戲底漢要見乃見衆中誰是見得底之禪和子試與老僧出氣看時出毫氣吾為汝證明去時有僧出衆問作麼生是大道心源之妙理師云一月普含一切水一切水月一月攝僧云恁麼為同為別乎師云汝不見華嚴六相義耶僧云總別同異成壞是何所作師云一圓相之中有一佛僧云佛是何物師云諱不得僧乃禮拜師云用禮為什麼師乃云同中有異異中同總別壞成一樹風天下陰凉人悉在何須熟處覓真宗便下座上堂因示徒云劫前一氣密密現成那箇一印堂堂記盛有時琉璃殿上玉女回首有時古鏡臺前石人撫掌還有人識取伊麼若能認得許你有今安樂處獨以平等無差法味穩知甘露灑落之妙文今日一會雲客蹈破草鞋入吾門來志究何處去一句了然超百億是什麼一句試道看道了而儼然坐時有僧出衆問學人不會請師舉揚師默然坐僧云承聞維摩有入不二門是也無師呵呵大笑云這顛言倒語漢僧便微笑休去師云老僧罪過僧便禮拜師云喫茶去僧云和尚恐是白拈賊師云與汝盜箇什麼僧云階前有下馬臺師便休師乃曰或說玄妙一理所宜或說了然三乘歸處共是八九成今日投子為諸禪德說了也且道是凡是聖於此商量雲抱青岑水回寒林不如此者誰是陶金乃下座上堂因示徒云火氣寒然雪心熟爾陽佛去來陰魔出沒畢竟作麼生天台山上南嶽眠少室峯頂熊耳坐顧視左右曰高著眼休盡是非田地虗拂除好惡家風妙自斯不用間空章未有一絲掛九竅諸大德且道如何一生得底人而相去時有僧出衆問和尚是得底不得底師云眉毛在眼睫上僧云鼻孔何處在師云汝不盲看僧呵呵大笑師云汝何得自瞞僧乃去師乃云拂子頭上薦得主丈頭上提取若能如斯半開又得半合又得恁麼不恁麼總得驀擲丈子曰猶是聻便下座上堂因示徒云扣聲入耳風無意梅影橫窗月不痕一輪所照是何物看取人人弄精魂畢竟歸去到甚麼處落處急急著眼看如能一朝撥轉管取一員無事道人未然閻老子不許汝在還會麼時有僧出衆問如何是一員無事道人師云要行便行要座便坐師僧如何僧云行止分明無物妨我師云汝是何物僧云苦屈苦屈師便打師乃云寂寂寥寥妙妙玄玄是何麼機用清清黯黯默默堂堂是什麼作略試請道看終日安然座一堂通宵寂寞絶商量欽光正脉付傳後笑暖機前點異芳便下座上堂因示徒曰昨夜木人眠室中今朝石女倚孤松如何是祖師來機腳下黃金超玉鳳一機歷歷密路堂堂彌滿洞輝日夜分明神珠一光暗裏抽橫骨蟻絲曲道明中座舌頭是衲僧行履處諸大德如何領覽時僧出衆云更深無夜色如何是木人室中睡師云深僧云天明無日氣如何是石女倚孤松師云淺僧云一機了然處如何是祖師意師云動僧云萬里無盡處如何是黃金鳳師云靜僧作禮拜云畢竟又如何師云內外虗玄徹底空寂僧乃去師乃云一法含多法一佛印諸佛一心合千心一念超萬念豈不見道栴檀移來一樹植春風秋葉色相同投子恁麼說義諸人與麼聽法畢竟無有二相具眼者自看便下座上堂因示徒曰心佛無住居覺位放光雨花動人天非真非虗梵音質這者萬萬具足玄還見麼前面孤明歷歷地曾無形影者是你一心之法也故古德云新羅國裡有一佛子才入三昧十方相隨是箇此也且道汝等諸禪德畢竟入三昧時以何相見還有答話分麼時有僧出衆問不動身心入三昧此理如何師云只是人人底僧云恁麼則用入三昧為什麼師云汝道如何是深入三昧僧云座具即不無未曾用禮拜師云是是僧乃作禮師乃云妙悟妙到直須一如或示棒或下示喝或論道或談禪自本無異法即今自性不即不離是何物若實合頭與諸佛何殊別乎吾門兒孫不要犯鋒傷手宛轉一氣旁參妙旨共是好手段便下座上堂因示徒曰豁開甘露解脫之法門透入華嚴莊嚴之心源妙哉遊戲三昧而現神通切哉出頭妙界而成聖道衲僧家脫盡光影而透出肚皮正當恁麼十成時還有相委底漢麼出來與老僧商量看時有僧出衆問如何是甘露門師云看看山前幸有真消息僧云和尚何如是漏泄師云曲為汝等僧云還轉無上法輪也否師云道什麼僧便喝師乃打僧云此恩難報師云此怨難酬師乃云歸座田地妙玄難臻衲僧做處曠遠自親如來頓教祖師心傳山嶽高低皆是付事還見麼竪起拂子高聲喚云諸大德是甚麼便下座上堂因示徒云海門秋靜雁音稀江水澄澄萬萬微好箇人間金葉色黃楓片片一時飛此箇田地明明歷歷處處堂堂雖然如是實知人少諸禪德還會麼君臣遍正共不用體用賓主皆是按排唯是尋常亦是大難若密著華戈不須一字腳若卒作模索未見三空旨投子恁麼告報早是琳上添玉土上加泥何故如此皎玉無瑕雕紋喪德大衆如何若當時有僧出衆問即是自知為什麼不疑師打云孰免箇窠窟僧云和尚莫謾打某甲去師擲下棒曰你又作麼生僧呵呵大笑出去師云且來闍梨僧不顧師云獅子以一滴乳迸散十六斛驢乳師乃云老僧適來為衆漏逗不少還知落處麼西天四七未知處東土二三不受時峯下源泉聲一㵎山頂嵐樹裊風枝諸禪德山僧這四句畢竟如何久參上士道看便下座師因謂衆云投子有三器今日舉似汝等子細聽直須以格調妙奏奇曲上正之器汝等諸人如何見絃以妙手將彈玉調中當之器汝等諸人如何見實以活眼見破天容下偏之器汝等諸人如何見衆皆默然師又云上正之人而可向上中當之人而可自已下偏之人而可今時若又三位共到了是可無位真人珍重師因謂衆曰今日憶得先師道平常無生句妙玄無私句體明無盡句汝等諸人一一商量看又云透得無生句方得法身透得無私句方得那邊透得無盡句方得目前三句畢竟得時一一了時衲僧珍重師因謂衆云華嚴經有六種之因緣有時總有時別有時同有時異有時成有時壞諸禪德畢竟如何領會此六相唯是一相總佛別心同法異念成僧壞情全一佛之所印珍重師因謂衆云經云三界唯一心心外無別法心佛及衆生是三無差別此意何處下觜拈一雙火筯云這箇還有心有佛有衆生耶若無為什麼唯一心於此如何道取先師云三界唯一心你還見我麼此理甚希有試道看珍重師因謂衆云妙有妙用其非功勳邊事豈世理所到乎何故如此如來未出世西天轉法輪祖師不西來茲土傳心印且道何物轉何物傳山雲冉冉江水滔滔良久云野菊含金漢泉𡃤玉君看消息別早是不可得珍重師因謂衆云見色見心聞聲悟道絶色絶心見色明心且道以什麼商量竪起團扇云這箇是見色見心投子恁麼說破既是剩語諸禪德還道取得麼放下團扇云是亦什麼心行珍重師因謂衆云止止不須說我法妙難思黃面老子驚殺鶖子誑呼衆人雖然如是實到此田地始得如是相如是性是什麼道理畢竟實相真性施為運動珍重師因謂衆云曩祖達磨大師單傳心印開示迷途教外別傳不立文字還有知落處者麼誰知還有教中語理孰識談言表意外且道為什麼對朕曰不識山僧太無端珍重師因謂衆云禪不在意會道豈以情覓乎吾得逢遠公方知有大事不是容易變弄一衆試取心中寶珠來呈我看珍重師因謂衆曰吾今日向汝等舉似洞山師翁五位一一領覽看真中有僞正中遍僞中有真遍中正圓中有圓正中來色中有色遍中至妙中有妙兼中到畢竟五位一位一位無位現空妙顯真真底是什麼物珍重有偈云却來元是正中遍向去正親遍裏正不來難辨正中來不去難知兼中至遍正遙絶兼中到了然一氣大極前雨過雲披天若洗鐘聲何入古松風又云諸人還知麼若能邈得分得去許汝有避遮生死冥符一舉却知隙避不及處且道新豐老子意唯顧小兒鳴却忘自己醜投子今日重露醜拙向人莫道好雖然與麼誰是真得實到漢出來共商量珍重師初到圓鑑禪師處鑑迎而致禮師唯默然鑑令見外道問佛不問有言不問無言話師受教坐堂中三年鑑時致問你還記得話頭麼師擬分踈鑑驀掩師口云汝向良久處會也師於言下忽然大悟乃作禮鑑曰你妙悟玄機耶師曰設有也須吐却時質侍者在傍見之乃云青華嚴宛如病得汗相似師回顧云合取狗口著若更忉忉吾乃嘔自此復經三載鑑時出洞下宗旨示之悉皆妙契付便以大陽和尚頂相皮履布直裰一十八般妙悟而囑云代吾續其宗風莫久滯此善宜護持遂書一偈送云須彌立大虗日月輔而轉群峯漸倚他白雲方改變小林風起叢曹溪洞捲簾金鳳宿龍巢宸苔豈車碾乃令依圓通秀禪師處師至彼無所參問唯嗜睡而已執事白秀云堂中有僧日睡當行規法秀云是誰執事云青上座秀云未可待與按過秀乃拽杖而入堂見師正睡乃擊牀頭呵云我這裡無間飯與上座喫了合打睡師云和尚教某甲何為秀云何不參禪去師云美食不中飽人喫秀云爭奈大有人不肯上座師云待肯堪作什麼秀云上座曾見何人來師云浮山遠和尚秀云怪得恁麼頑賴握手相笑歸方丈由是道聲藉甚兮師一日坐次有一僧諱曰道楷乃來致問佛祖言句如家常茶飯離此外別有為人處麼師云汝道寰中天子勑還假禹湯堯舜也無楷擬進語師以拂子撼楷口上云汝發意來早有三十棒分楷乃於言下大悟師云汝見何道理楷作禮而去師云汝曾到不疑之地乎楷掩耳而出去師大悅許之師一日坐次索門人云吾有一句子諸禪德下語自代云不辭向諸人道恐帶纍吾兒孫乃有偈云巍巍作王容堂堂現妙道吾有一句子驢載舉宗風又云同師一日入堂因有一僧眠師云宛如老僧在圓通禪師處對話相似僧默然師云你還邈得耶僧擬分踈師乃打僧於此豁然大悟乃作禮師云你見什麼乃禮拜僧云今日如貧人獲明珠師欣然而去其僧徑上方丈正宣前事師呵責云且去跋曰師諱義青俗姓青社李氏子也七歲頴異自往妙相寺出家試經得度習百法論未幾云三祇塗遠自困有何益乃入洛聽華嚴義宛若貫珠賞護無間斷嘗讀諸林菩薩偈至即心自性猛省曰法離文字寧可講乎即棄捨獨遊宗席時浮山圓鑑禪師法遠和尚居會聖岩因一夕夢見手畜青色鷹尤為吉徵至旦師遂臻遠以禮迎之其機緣語端見前章兮世謂之青鷹便是此謂乎人又曰是青華嚴蓋是為以華嚴為業之兼契大陽安大師卷續洞下宗乘不舉世一十三年大陽傳法偈付法遠和尚云陽廣山頭草倚君待煆焞異苗繁茂處深密固靈根其偈尾云得法者潛衆十年而方應宣揚法遠和尚受之自贊師翁大陽頂相曰黑狗爛銀蹄白象崑崙騎於斯二無礙木馬火中嘶遠乃以此等物而授師師悉受之乃交衆作務十二載也其後唱起新豐之雪曲排成洞上之妙燈一千餘代出佛之模範三四有年現祖之機用獨紹陽廣踵自舉煆焞之劒投子山頭龍作金鳳之舞大唐國裏虎露玉麟之蹄深入報身無差境界穩現華嚴無邊妙相其法嗣出世者其員八人住芙蓉曰道楷住石門曰元易住泐潭曰惟照住淨因曰法成住大洪云守遂住白水云妙榮住紫陽云了期住雲蓋曰剎利此等大宗匠作枝成蔓玉回珠轉師云大略如此豈以言句喧之得乎勑諡妙續大師住丹霞山三世孫沙門子淳卒馳禿筆撰之竟
